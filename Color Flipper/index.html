<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>Color Flipper</title>
</head>
<body>
    <div class="container">
    <h1 id="title">COLOR FLIPPER</h1>
        <button id="redBtn" onclick="setColor('red')">Red</button>
        <button id="greenBtn" onclick="setColor('green')">Green</button>
        <button id="yellowBtn" onclick="setColor('yellow')">Yellow</button>
        <button id="randomBtn" onclick="randomColor()">Random</button>
    </div>
    <script src="script.js"></script>
</body>
</html>
